# ESP32-C6 bare-metal target (esp-hal v1.1.1).
# Build: cargo +esp build --release --target riscv32imac-unknown-none-elf

[build]
target = "riscv32imac-unknown-none-elf"

[target.riscv32imac-unknown-none-elf]
runner = "espflash flash --monitor"
rustflags = [
    "--clear",
    "-C", "link-arg=-Tlinkall.x",
]